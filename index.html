<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATÁLOGO GENERAL</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f0f0f0;}

#banner{
background:#2f2f2f;
padding:10px 20px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:1000;
}

#logo{height:50px;}

#buscadorWrap{flex:1;display:flex;justify-content:flex-end;}

#buscador{
width:320px;
padding:10px;
font-size:16px;
border-radius:6px;
border:none;
}

/* RUBROS DESKTOP */

#rubros{
width:220px;
height:calc(100vh - 70px);
background:#111;
color:white;
position:fixed;
top:70px;
padding:10px;
overflow-y:auto;
}

.rubro-btn{
width:100%;
margin:4px 0;
padding:8px;
background:#222;
border:none;
color:white;
cursor:pointer;
text-align:left;
font-size:14px;
}

.rubro-btn:hover{background:#555;}

.rubro-btn.activo{
background:#d40000;
color:white;
font-weight:bold;
}

/* RUBROS MOBILE */

#rubrosMobileWrapper{position:relative;}

#rubrosMobile{
display:none;
background:#111;
padding:6px 30px;
overflow-x:auto;
white-space:nowrap;
scroll-behavior:smooth;
}

#rubrosMobile button{
display:inline-block;
margin-right:6px;
padding:6px 10px;
background:#222;
color:white;
border:none;
border-radius:4px;
font-size:14px;
cursor:pointer;
}

#rubrosMobile button.activo{
background:#d40000;
color:white;
font-weight:bold;
}

/* FLECHAS */

#flechaIzq,#flechaDer{
position:absolute;
top:50%;
transform:translateY(-50%);
color:yellow;
font-size:22px;
animation:titilar 1s infinite;
display:none;
cursor:pointer;
z-index:10;
}

#flechaIzq{left:5px;}
#flechaDer{right:5px;}

@keyframes titilar{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

/* CONTENIDO */

#contenido{
margin-left:230px;
padding:10px;
margin-top:70px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

/* TARJETA */

.producto{
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
overflow:hidden;
position:relative;
}

.nuevo{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:4px 8px;
font-size:12px;
font-weight:bold;
border-radius:4px;
z-index:2;
}

.producto img{
width:100%;
height:320px;
object-fit:contain;
background:white;
cursor:zoom-in;
}

.info{background:#e8e8e8;padding:10px;}

.info h3,.desc,.precio{text-align:center;}

.desc{
font-size:13px;
color:#333;
line-height:1.3;
min-height:105px;
}

.ean{font-size:12px;color:#666;}

.precio{
font-size:20px;
font-weight:bold;
color:darkred;
margin-top:10px;
}

/* MODAL */

#modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

#modal img{max-width:95%;max-height:95%;}

#modal span{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:30px;
cursor:pointer;
}

/* MOBILE */

@media (max-width:700px){

#logo{height:40px;}

#buscador{width:180px;}

#rubros{display:none;}

#rubrosMobile{display:block;}

#rubrosMobileWrapper{
position:sticky;
top:60px;
z-index:999;
}

#contenido{
margin-left:0;
margin-top:120px;
}

.grid{grid-template-columns:repeat(2,1fr);}

.producto img{height:200px;}

}
</style>
</head>

<body>

<div id="banner">
<div id="buscadorWrap">
<input id="buscador" placeholder="Buscar código o descripción...">
</div>
<img id="logo" src="LOGO.jpg">
</div>

<div id="rubrosMobileWrapper">
<div id="flechaIzq">◀</div>
<div id="rubrosMobile"></div>
<div id="flechaDer">▶</div>
</div>

<div id="rubros"></div>

<div id="contenido">
<div id="productos" class="grid"></div>
</div>

<div id="modal">
<span onclick="cerrarModal()">✖</span>
<img id="modalImg">
</div>

<script>

const CSV_FILE="PRODUCTOS.csv";

let productos=[];
let rubros=new Set();
let promos=[];

/* CARGAR PROMOS */

function cargarPromos(){

for(let i=1;i<=50;i++){

let img="PROMOS/PROMO"+i+".jpg";

let test=new Image();

test.onload=function(){
promos.push(img);
};

test.src=img;

}

}

/* PRECIO */

function formatPrecio(p){
if(!p||p=="")return"";
if(p.toUpperCase()=="AGOTADO")return"AGOTADO";
return"$ "+Number(p).toLocaleString("es-AR");
}

/* FOTO */

function buscarImagen(p){
if(p.CARPETA&&p.CARPETA!==""){
return p.CARPETA+"/"+p.CODIGO+".jpg";
}
return"noimg.jpg";
}

/* TARJETA */

function cardHTML(p){

let img=buscarImagen(p);

let nuevo=(p.NEW&&p.NEW.toUpperCase()=="SI")?`<div class="nuevo">NUEVO</div>`:"";

return`
<div class="producto">

${nuevo}

<img src="${img}"
onclick="verGrande('${img}')"
onmouseenter="fotoAlt(this,'${p.CODIGO}','${p.CARPETA}')"
onmouseleave="fotoOriginal(this)">

<div class="info">

<h3>${p.CODIGO}</h3>

<div class="desc">

<b>${p.LINEA1||""}</b><br>
${p.LINEA2||""}<br>
${p.LINEA3||""}<br>
${p.LINEA4||""}

</div>

<div class="precio">${formatPrecio(p.PRECIO)}</div>

</div>
</div>
`;

}

/* CSV */

fetch(CSV_FILE)
.then(r=>r.text())
.then(text=>{

let lines=text.trim().split("\n");
let headers=lines[0].split(";").map(h=>h.trim().toUpperCase());

for(let i=1;i<lines.length;i++){

let cols=lines[i].split(";");
let obj={};

headers.forEach((h,j)=>obj[h]=cols[j]?cols[j].trim():"");

productos.push(obj);

if(obj.RUBRO)rubros.add(obj.RUBRO);

}

/* ORDEN NUEVO */

productos.sort((a,b)=>{

let r=(a.RUBRO||"").localeCompare(b.RUBRO||"","es");
if(r!==0) return r;

let o=(Number(a.ORD)||0)-(Number(b.ORD)||0);
if(o!==0) return o;

return (a.CODIGO||"").localeCompare(b.CODIGO||"","es");

});

crearRubros();
mostrarNovedades();
setTimeout(actualizarFlechas,300);

});

cargarPromos();

/* RUBROS */

function crearRubros(){

let div=document.getElementById("rubros");
let mob=document.getElementById("rubrosMobile");

div.innerHTML="";
mob.innerHTML="";

if(promos.length>0){

div.innerHTML+=`<button class="rubro-btn" onclick="mostrarPromos()">PROMOCIONES</button>`;
mob.innerHTML+=`<button onclick="mostrarPromos()">PROMOCIONES</button>`;

}

div.innerHTML+=`<button class="rubro-btn activo" onclick="mostrarNovedades()">NOVEDADES</button>`;
mob.innerHTML+=`<button class="activo" onclick="mostrarNovedades()">NOVEDADES</button>`;

let rubrosOrdenados=[...rubros].sort((a,b)=>a.localeCompare(b,"es"));

rubrosOrdenados.forEach(r=>{

div.innerHTML+=`<button class="rubro-btn" onclick="mostrarRubro('${r}')">${r}</button>`;
mob.innerHTML+=`<button onclick="mostrarRubro('${r}')">${r}</button>`;

});

}

/* PROMOS */

function mostrarPromos(){

activarBoton("PROMOCIONES");

document.getElementById("productos").innerHTML=
promos.map(img=>`
<div class="producto">
<img src="${img}" onclick="verGrande('${img}')">
</div>
`).join("");

}

/* HOVER FOTO */

function fotoAlt(img,codigo,carpeta){

let alt="";

if(carpeta=="FOTOS1") alt="FOTOS1A/"+codigo+".jpg";
if(carpeta=="FOTOS2") alt="FOTOS2A/"+codigo+".jpg";

if(!alt) return;

let test=new Image();

test.onload=function(){
img.dataset.original=img.src;
img.src=alt;
};

test.src=alt;

}

function fotoOriginal(img){

if(img.dataset.original){
img.src=img.dataset.original;
}

}

/* PRODUCTOS */

function mostrarRubro(r){

activarBoton(r);

document.getElementById("productos").innerHTML=
productos.filter(p=>p.RUBRO==r).map(cardHTML).join("");

}

function mostrarNovedades(){

activarBoton("NOVEDADES");

document.getElementById("productos").innerHTML=
productos.filter(p=>p.NEW&&p.NEW.toUpperCase()=="SI").map(cardHTML).join("");

}

function activarBoton(nombre){

document.querySelectorAll(".rubro-btn,#rubrosMobile button").forEach(b=>{
b.classList.remove("activo");
if(b.textContent==nombre)b.classList.add("activo");
});

}

/* BUSCADOR */

document.getElementById("buscador").addEventListener("input",e=>{

let t=e.target.value.toLowerCase();

document.getElementById("productos").innerHTML=
productos.filter(p=>Object.values(p).join(" ").toLowerCase().includes(t))
.map(cardHTML).join("");

});

/* MODAL */

function verGrande(src){
document.getElementById("modalImg").src=src;
document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
