<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
display:flex;
align-items:center;
justify-content:flex-end;
gap:20px;
padding:10px;
background:white;
border-bottom:1px solid #ddd;
}

#logo{
height:50px;
}

#buscador{
padding:8px;
font-size:16px;
width:220px;
}

#rubros{
display:flex;
gap:10px;
overflow-x:auto;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

.rubro{
padding:6px 12px;
border:1px solid #ccc;
cursor:pointer;
white-space:nowrap;
}

.rubro.activo{
background:#d40000;
color:white;
border-color:#d40000;
}

#productos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.producto{
background:white;
padding:10px;
border-radius:6px;
text-align:center;
}

.producto img{
width:100%;
cursor:pointer;
transition:0.2s;
}

.precio{
font-weight:bold;
margin-top:5px;
}

.agotado{
color:red;
font-weight:bold;
}

@media (max-width:700px){

#productos{
grid-template-columns:repeat(2,1fr);
}

#rubros{
position:sticky;
top:0;
z-index:50;
}

}

</style>
</head>

<body>

<header>

<input type="text" id="buscador" placeholder="Buscar...">
<img id="logo" src="logo.png">

</header>

<div id="rubros"></div>
<div id="productos"></div>

<script>

let productos=[]
let rubroActivo=""

fetch("stock.csv")
.then(r=>r.text())
.then(texto=>{

let lineas=texto.split("\n")

for(let i=1;i<lineas.length;i++){

let c=lineas[i].split(",")

if(c.length<5) continue

productos.push({

codigo:c[0],
nombre:c[1],
precio:c[2],
rubro:c[3],
foto:c[4]

})

}

crearRubros()
mostrarProductos()

})

function crearRubros(){

let lista=[...new Set(productos.map(p=>p.rubro))]

let cont=document.getElementById("rubros")

lista.sort()

lista.forEach(r=>{

let b=document.createElement("div")

b.className="rubro"
b.innerText=r

b.onclick=()=>{

rubroActivo=r
mostrarProductos()

document.querySelectorAll(".rubro").forEach(x=>x.classList.remove("activo"))
b.classList.add("activo")

}

cont.appendChild(b)

})

}

function mostrarProductos(){

let cont=document.getElementById("productos")
cont.innerHTML=""

let filtro=document.getElementById("buscador").value.toLowerCase()

productos
.filter(p=>(!rubroActivo || p.rubro==rubroActivo))
.filter(p=>p.nombre.toLowerCase().includes(filtro))
.sort((a,b)=>a.nombre.localeCompare(b.nombre))
.forEach(p=>{

let div=document.createElement("div")
div.className="producto"

let img=document.createElement("img")

img.src=p.foto

activarHoverImagen(img)

div.appendChild(img)

let n=document.createElement("div")
n.innerText=p.nombre
div.appendChild(n)

let precio=document.createElement("div")

if(p.precio=="AGOTADO"){

precio.innerHTML="<span class='agotado'>AGOTADO</span>"

}else{

precio.className="precio"
precio.innerText="$ "+p.precio

}

div.appendChild(precio)

cont.appendChild(div)

})

}

document.getElementById("buscador").oninput=mostrarProductos



function activarHoverImagen(img){

let original = img.src

img.addEventListener("mouseenter",()=>{

if(original.includes("FOTOS1/")){

let alt = original.replace("FOTOS1/","FOTOS1A/")

let test = new Image()

test.onload=function(){

img.dataset.original=original
img.src=alt

}

test.src=alt

}

if(original.includes("FOTOS2/")){

let alt = original.replace("FOTOS2/","FOTOS2A/")

let test = new Image()

test.onload=function(){

img.dataset.original=original
img.src=alt

}

test.src=alt

}

})

img.addEventListener("mouseleave",()=>{

if(img.dataset.original){

img.src=img.dataset.original

}

})

}

</script>

</body>
</html>
